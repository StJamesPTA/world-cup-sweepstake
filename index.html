<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>St James' PTA World Cup 2026 Goals Sweepstake</title>

<style>
body{font-family:system-ui;background:#0b1220;color:white;padding:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333}
th{background:#111}
</style>
</head>

<body>

<h1>World Cup Sweepstake</h1>
<div id="updated">Loading…</div>

<h2>Ticket Standings</h2>
<input id="search" placeholder="Search..." style="margin-bottom:10px;padding:6px;width:200px"/>

<table id="standingsTable">
<thead>
<tr>
<th>Pos</th>
<th>Ticket</th>
<th>Owner</th>
<th>Teams</th>
<th>Goals</th>
<th>GD</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Recent Matches</h2>
<div id="recent"></div>

<h2>Team Stats</h2>
<table id="teamsTable">
<thead>
<tr>
<th>Team</th><th>GF</th><th>GA</th><th>GD</th><th>P</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const CACHE = '?t=' + Date.now();

async function fetchJSON(url){
  const r = await fetch(url);
  return r.json();
}

let allRows = [];

function renderStandings(rows){
  const tbody = document.querySelector('#standingsTable tbody');
  tbody.innerHTML = '';

  rows.forEach(r=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${r.position}</td>
      <td>${r.ticket}</td>
      <td>${r.owner}</td>
      <td>${r.teams.join(' / ')}</td>
      <td>${r.goals}</td>
      <td>${r.gd}</td>
    `;

    tbody.appendChild(tr);
  });
}

function renderRecent(matches){
  const el = document.getElementById('recent');

  if(!matches.length){
    el.innerHTML = 'No matches yet';
    return;
  }

  el.innerHTML = '<ul>' + matches.map(m =>
    `<li>${m.home} vs ${m.away} — ${m.score}</li>`
  ).join('') + '</ul>';
}

function renderTeams(teams){
  const tbody = document.querySelector('#teamsTable tbody');
  tbody.innerHTML = '';

  teams.forEach(t=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${t.team}</td>
      <td>${t.gf}</td>
      <td>${t.ga}</td>
      <td>${t.gd}</td>
      <td>${t.played}</td>
    `;

    tbody.appendChild(tr);
  });
}

function buildStandings(tickets, teamsData){

  const teamMap = new Map(
    teamsData.teams.map(t => [t.team, t])
  );

  const rows = tickets.map(t=>{

    const goals = t.teams.reduce((sum,name)=>sum + (teamMap.get(name)?.gf || 0),0);
    const gd    = t.teams.reduce((sum,name)=>sum + (teamMap.get(name)?.gd || 0),0);

    return {
      ticket: t.ticket,
      owner: t.owner,
      teams: t.teams,
      goals,
      gd,
      rank: t.rank
    };
  });

  rows.sort((a,b)=> b.goals - a.goals || b.gd - a.gd || b.rank - a.rank);

  rows.forEach((r,i)=> r.position = i + 1);

  return rows;
}

async function load(){

  const [teamsData, recentData, tickets] = await Promise.all([
    fetchJSON('./standings/teams.json'+CACHE),
    fetchJSON('./standings/recent_finished.json'+CACHE),
    fetchJSON('./data/tickets.json'+CACHE)
  ]);

  document.getElementById('updated').textContent =
    'Updated: ' + new Date().toLocaleTimeString();

  const rows = buildStandings(tickets, teamsData);

  allRows = rows;

  renderStandings(rows);
  renderRecent(recentData.matches || []);
  renderTeams(teamsData.teams || []);
}

// search
document.getElementById('search').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();

  renderStandings(
    allRows.filter(r =>
      String(r.ticket).includes(q) ||
      r.owner.toLowerCase().includes(q) ||
      r.teams.some(t => t.toLowerCase().includes(q))
    )
  );
});

load();
setInterval(load, 120000);

</script>

</body>
</html>
